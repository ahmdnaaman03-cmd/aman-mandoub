<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الآمنة</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #eef2f3; margin-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: inline-block; width: 90%; max-width: 400px; }
        .amount { font-size: 24px; color: #d32f2f; font-weight: bold; }
        .btn { background-color: #4CAF50; color: white; padding: 15px 20px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        .btn:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="card">
        <h2>مرحباً {{ customer_name }}</h2>
        <p>قيمة الشحنة المطلوبة:</p>
        <p class="amount">{{ amount_to_pay }} ج.م</p>
        
        <form action="{{ confirm_url }}" method="POST">
            <button type="submit" class="btn">تأكيد الدفع وإتمام الطلب</button>
        </form>
    </div>
</body>
</html>
