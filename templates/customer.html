<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Aman El-Mandoob</title>
    <meta property="og:title" content="Aman El-Mandoob Secure Checkout">
    <meta property="og:image" content="{{ url_for('static', filename='og-image.png', _external=True) }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .checkout-card { max-width: 420px; margin: 50px auto; border-radius: 16px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .amount-box { background-color: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .btn-pay { background-color: #16a34a; color: #fff; font-weight: 700; padding: 14px; border-radius: 10px; border: none; font-size: 1.1rem; }
        .btn-pay:hover { background-color: #15803d; color: #fff; }
        .brand-logo { max-width: 80px; height: auto; }
    </style>
</head>
<body>
    <div class="container px-3">
        <div class="card checkout-card p-4 bg-white">
            <div class="text-center mb-3">
                <img src="{{ url_for('static', filename='og-image.png') }}" alt="Aman El-Mandoob Logo" class="brand-logo mb-2 mx-auto">
                <h4 class="fw-bold text-dark m-0">Aman El-Mandoob</h4>
                <span class="badge bg-success-subtle text-success border border-success-subtle px-3 py-1 mt-2">🔒 Encrypted Payment</span>
            </div>

            <div class="amount-box p-3 text-center mb-4">
                <p class="text-secondary small mb-1 text-uppercase fw-semibold">Total Amount Due</p>
                <h2 class="fw-extrabold text-dark m-0">{{ "%.2f"|format(amount_to_pay) }} <small class="fs-6 text-muted">EGP</small></h2>
                <p class="text-muted small mt-2 mb-0">Customer: <strong>{{ customer_name }}</strong></p>
            </div>

            <form action="{{ confirm_url }}" method="POST">
                <button type="submit" class="btn btn-pay w-100">Pay Now</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small" style="font-size: 0.8rem;">Powered by Aman El-Mandoob Digital Security</p>
            </div>
        </div>
    </div>
</body>
</html>
