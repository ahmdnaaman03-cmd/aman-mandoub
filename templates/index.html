<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أمان المندوب - بوابة التحصيل</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 10px; width: 200px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>نظام أمان المندوب</h2>
        <input type="text" id="orderId" placeholder="أدخل رقم الشحنة">
        <button onclick="window.location.href='/delegate/' + document.getElementById('orderId').value">عرض QR الكود</button>
    </div>
</body>
</html>
