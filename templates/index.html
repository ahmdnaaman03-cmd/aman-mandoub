<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أمان المندوب - الدفع الفوري</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; box-sizing: border-box; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #198754; }
        button { width: 100%; padding: 14px; background: #198754; color: #ffffff; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:hover { background: #157347; }
        #result { margin-top: 20px; font-size: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin: 0; color: #212529;">🛡️ أمان المندوب</h2>
        <p style="color: #6c757d; font-size: 14px;">توليد كود الدفع السريع</p>
        
        <input type="text" id="orderId" placeholder="أدخل رقم الطلب (مثال: 1001)">
        <button onclick="generate()">توليد QR Code</button>
        
        <div id="result"></div>
    </div>

    <script>
        function generate() {
            const oid = document.getElementById('orderId').value.trim();
            const res = document.getElementById('result');
            
            if(!oid) { 
                res.innerHTML = '<span style="color:#dc3545; font-weight:bold;">الرجاء إدخال رقم الطلب</span>'; 
                return; 
            }
            
            res.innerHTML = '<span style="color:#6c757d;">جاري الاتصال بالخادم...</span>';
            
            fetch('/generate_qr', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'order_id=' + encodeURIComponent(oid)
            })
            .then(r => r.json())
            .then(d => {
                if(d.qr_image) {
                    res.innerHTML = `<img src="${d.qr_image}" style="max-width:200px; border-radius:8px;"><p style="color:#198754; font-weight:bold;">تم التوليد بنجاح!</p>`;
                } else {
                    res.innerHTML = `<span style="color:#dc3545; font-weight:bold;">${d.error || 'خطأ في الاستجابة'}</span>`;
                }
            })
            .catch(() => {
                res.innerHTML = '<span style="color:#dc3545; font-weight:bold;">فشل الاتصال. الخادم لا يستجيب أو المسار غير موجود.</span>';
            });
        }
    </script>
</body>
</html>
